<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Monitor</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  color: #00ffcc;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

.box {
  animation: pop 1s ease;
}

#result {
  margin-top: 20px;
  font-size: 1.4em;
  color: red;
  animation: blink 0.6s infinite;
}

#status {
  opacity: 0.8;
}

@keyframes blink {
  0%,100% {opacity:1;}
  50% {opacity:0.2;}
}

@keyframes pop {
  from {transform: scale(0.8); opacity:0;}
  to {transform: scale(1); opacity:1;}
}

.glitch {
  color: #ff0033;
  margin-top: 10px;
  animation: shake 0.2s infinite;
}

@keyframes shake {
  0% {transform: translate(1px,1px);}
  25% {transform: translate(-1px,2px);}
  50% {transform: translate(-2px,-1px);}
  75% {transform: translate(2px,1px);}
  100% {transform: translate(1px,-1px);}
}
</style>
</head>

<body>

<div class="box">
  <h1>ACCESSING SYSTEM...</h1>

  <p>User: [NAME]</p>

  <p id="status">Starting scan...</p>

  <div id="result"></div>

  <div class="glitch">⚠ SYSTEM BREACH DETECTED ⚠</div>
</div>

<script>
let messages = [
  "Scanning user profile...",
  "Checking humor database...",
  "Bypassing personality firewall...",
  "Analyzing brain.exe...",
  "Final judgment loading..."
];

let i = 0;

let status = document.getElementById("status");
let result = document.getElementById("result");

let interval = setInterval(() => {
  if (i < messages.length) {
    status.innerText = messages[i];
    i++;
  }
}, 1200);

setTimeout(() => {
  clearInterval(interval);
  status.innerText = "ACCESS COMPROMISED";
  result.innerText = "RESULT: UNFUNNIEST PERSON EVER 💀";
}, 7000);
</script>

</body>
</html>
